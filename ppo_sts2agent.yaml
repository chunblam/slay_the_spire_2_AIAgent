# configs/ppo_sts2agent.yaml
# STS2AIAgent Mod 适配版本训练配置
# 此配置专用于STS2-Agent Mod（端口18080），而非STS2MCP（端口15526）

device: "auto"   # "cpu" | "cuda" | "auto"

# ── 环境 ──────────────────────────────────────────────────────────────────────
env:
  host: "127.0.0.1"
  port: 18080               # STS2AIAgent Mod 端口
  character_index: 0          # 自动开局时角色索引（0-based）
  startup_debug: false        # 仅排障时打开，常态训练建议关闭
  action_poll_interval: 0.8   # 轮询退避间隔（用于 reset/retry）；更大更平滑
  action_min_interval: 0.8    # 每两个 action 的最小间隔（秒）
  post_action_settle: 0.8     # action 发出后等待状态稳定的时间（秒）
  action_retry_count: 1       # 单步动作失败重试次数（不宜过大，避免抖动）
  num_actions: 16

# ── 模型 ──────────────────────────────────────────────────────────────────────
model:
  hidden_dim: 256
  card_d_model: 64
  monster_d_model: 32

# ── 训练超参数 ─────────────────────────────────────────────────────────────────
train:
  total_steps: 30000 #2_000_000
  buffer_size: 256
  n_epochs: 3 #4
  batch_size: 64
  lr: 3.0e-4
  clip_eps: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  save_interval: 5000 
  resume_on_restart: true      # 中断后自动读取 checkpoints/training_state.json 续训
  save_latest_per_update: true # 每次 PPO update 保存 latest_model.pt，降低中断损失
  continue_logs_on_resume: true      # 续训时复用上次 latest_run_dir，日志继续追加
  manual_intervention_max_wait: 180.0 # 未知状态人工介入等待上限（秒）
  manual_intervention_poll: 0.5       # 人工介入后状态轮询间隔（秒）

# ── LLM Advisor ───────────────────────────────────────────────────────────────
llm:
  enabled: false             # 总开关：false=纯RL，true=启用全部LLM综合评估（card/relic/map/combat_opening）

  # ── 后端选择（取消注释其中一组）──────────────────────────────────────────
  # 选项 A: 本地 Ollama（推荐，免费）
  backend: "ollama"
  model: "qwen2.5:7b"        # 替代: "llama3.2:3b"（更快但效果弱）
  base_url: "http://127.0.0.1:11434"

  # 选项 B: OpenAI API（需KEY）
  # backend: "openai"
  # model: "gpt-4-turbo-preview"
  # api_key: "sk-xxx"         # 建议以环境变量 OPENAI_API_KEY 提供

  # 选项 C: 离线模式（无需任何LLM服务）
  # backend: "offline"
  # mode: "demo"              # demo | none

  # ── 综合评估开关 ──────────────────────────────────────────────────────────
  strategy: "balanced"      # aggressive | balanced | conservative

  use_map_advisor: false
  use_combat_advisor: false
  use_relic_advisor: false
  use_card_advisor: false
  use_rest_advisor: false
  use_event_advisor: false

  top_k: 3
  temperature: 0.2
  match_bonus_coef: 0.8

logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  tensorboard: true         # 启用TensorBoard日志
  checkpoint_verbose: false # 保存时详细打印

# ── 奖励塑形权重 ───────────────────────────────────────────────────────────────
reward:
  # ── 层权重 ────────────────────────────────────────────────────────────────
  layer_a_weight: 0.8          # 降低即时奖励，腾出空间给构筑信号
  layer_b_weight: 0.8          # 降低回合奖励，避免战斗爆表
  layer_c_weight: 1.2          # 升高战斗通关奖励，鼓励完成战斗
  layer_d_weight: 0.5          # 升高（从 0.3），构筑决策应该更可见 (+67%)
  layer_e_weight: 0.3          # 大幅降低（从 1.0），避免被终局惩罚压制
  llm_weight: 0.3              # 全局路线评估奖励权重（llm.enabled=true 时生效）

  # ── Layer A（动作级即时）────────────────────────────────────────────────
  action_damage_coef: 0.004    # 25伤 -> +0.10
  action_block_coef: 0.002     # 25格挡 -> +0.05
  action_card_pick_bonus: 0.05 # 拿牌即时小奖励
  action_potion_bonus: 0.05    # 使用药水小奖励（避免囤药）

  # ── Layer B（回合级结算）────────────────────────────────────────────────
  dmg_reward_cap: 1.5          # 本回合伤害效率奖励上限
  kill_reward_per_enemy: 2.0   # 回合内每击杀一敌
  block_coverage_reward: 1.0   # 完美格挡覆盖奖励
  excess_block_penalty_cap: 0.2 # 超额格挡最大惩罚
  energy_waste_penalty: 0.5    # 有牌可打却浪费能量的最大惩罚
  hp_loss_penalty: 1.5         # 被敌人打掉HP的基础惩罚系数
  hp_loss_urgency_max_mul: 2.0 # 濒死时HP损失惩罚的最大倍数

  # ── Layer C（战斗级结算）────────────────────────────────────────────────
  normal_combat_bonus: 3.0     # 普通战斗通关基础奖励
  elite_combat_bonus: 8.0      # 精英战通关基础奖励
  boss_combat_bonus: 25.0      # Boss通关基础奖励（升高，鼓励 Boss 挑战）
  boss_extra_bonus: 10.0       # Boss通关额外奖励
  hp_efficiency_max: 4.0       # HP效率奖励上限（满血通关可得）
  elite_clean_bonus: 3.0       # 精英战HP损失<30%的额外奖励
  elite_clean_threshold: 0.3   # 精英低损判定阈值

  # ── Layer D（局外阶段，已由 layer_d_weight 统一缩放）───────────────────
  rest_low_hp_bonus: 1.0       # HP<35% 时休息奖励
  rest_mid_hp_bonus: 0.3       # HP 35%-60% 时休息奖励
  rest_high_hp_penalty: 0.5    # HP>80% 时休息惩罚
  rest_low_threshold: 0.35
  rest_mid_threshold: 0.6
  rest_high_threshold: 0.8
  smith_bonus: 0.5             # 营地锻造奖励
  remove_card_bonus: 0.4       # 删牌奖励
  choose_card_meta_bonus: 0.4  # 选牌奖励（升高，卡牌选择很重要）
  claim_gold_bonus: 0.12       # claim_reward: 金币
  claim_card_bonus: 0.18       # claim_reward: 卡牌（仅点击奖励项，不含后续选卡）
  claim_potion_bonus: 0.15     # claim_reward: 药水
  claim_relic_bonus: 0.25      # claim_reward: 遗物
  claim_remove_card_bonus: 0.2 # claim_reward: RemoveCard
  claim_special_card_bonus: 0.2 # claim_reward: SpecialCard
  claim_linked_set_bonus: 0.18 # claim_reward: LinkedRewardSet
  claim_unknown_bonus: 0.1     # claim_reward: 未知类型兜底
  buy_bonus: 0.2               # 商店购买奖励

  # ── 三阶段动态权重（按 train.total_steps 比例切分）──────────────────────
  phase_schedule:
    enabled: true
    early_end_ratio: 0.2       # 前期结束位置：total_steps * 0.2
    mid_end_ratio: 0.7         # 中期结束位置：total_steps * 0.7
    early_weights:
      layer_a: 0.8
      layer_b: 0.8
      layer_c: 1.2
      layer_d: 0.5
      layer_e: 0.3
    mid_start_weights:
      layer_a: 0.8
      layer_b: 0.8
      layer_c: 1.2
      layer_d: 0.5
      layer_e: 0.3
    mid_end_weights:
      layer_a: 0.82
      layer_b: 0.82
      layer_c: 1.15
      layer_d: 0.5
      layer_e: 0.7
    late_weights:
      layer_a: 0.85
      layer_b: 0.85
      layer_c: 1.1
      layer_d: 0.5
      layer_e: 0.8

  # ── Layer E（终局）──────────────────────────────────────────────────────
  terminal_victory_bonus: 100.0
  terminal_defeat_penalty: 12.0  # 大幅降低（从 30.0），避免早期被终局噪声压制
  terminal_floor_weight: 1.5   # 每层 +1.5
  terminal_hp_quality_weight: 10.0  # 存活时HP质量加成

  # ── 奖励裁剪 ────────────────────────────────────────────────────────────
  reward_clip: 50.0

  # ── LLM match 奖励（llm.enabled=true 时生效）───────────────────────────
  card_weight: 0.4
  card_match_bonus: 1.0
  card_mismatch_penalty: 0.5
  relic_choice_weight: 0.25
  map_route_weight: 0.25
  combat_opening_weight: 0.2

# ── 性能优化（可选）────────────────────────────────────────────────────────────
perf:
  num_workers: 0             # 并行采样；0=禁用（当前推荐）
  pin_memory: false
  prefetch_size: 2

# ── 其他 ──────────────────────────────────────────────────────────────────────
checkpoint_dir: "checkpoints"
render: false
